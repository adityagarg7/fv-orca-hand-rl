[workspace]
name = "fv-orca-hand-rl"
description = "RL training for the ORCA dexterous hand (in-hand cube reorientation)."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.11.*"
pip = "*"          # needed by the setup-orca task to install orca_sim editable

[pypi-dependencies]
# Mirrors requirements.txt. orca_sim is NOT here — its published package omits
# some MuJoCo assets, so it is installed editable from a clone (see setup-orca).
stable-baselines3 = { version = ">=2.0", extras = ["extra"] }
mujoco = ">=3.1"
gymnasium = ">=0.29"
tensorboard = ">=2.14"
wandb = ">=0.16"

[tasks]
# ── One-time setup ────────────────────────────────────────────────────────────
# Clone orca_sim as a sibling folder and install it editable.  Safe to re-run.
setup-orca = "git clone https://github.com/orcahand/orca_sim.git ../orca_sim || true && pip install -e ../orca_sim"

# W&B login (stores API key in ~/.netrc, never committed to Git).
login = "wandb login"

# ── Curriculum training (v11 — Workstation) ──────────────────────────────────
# Primary: 64 envs, SubprocVecEnv, CUDA GPU, 150M steps.
# Expected wall time: 6–10 hours on a 12-core workstation with RTX GPU.
# NOTE: MuJoCo physics is CPU-bound; the GPU only runs the small MLP, so all
# 64 envs load the CPU regardless of --device. Lower --n-envs for thermal headroom.
curriculum = "python train_curriculum.py --n-envs 64 --device cuda --subproc --timesteps 150_000_000 --save-dir ./checkpoints --upload-model"

# CPU-only fallback (no GPU): 48 envs, SubprocVecEnv, 100M steps.
curriculum-cpu = "python train_curriculum.py --n-envs 48 --device cpu --subproc --timesteps 100_000_000 --save-dir ./checkpoints"

# Quick sanity check (2 envs, DummyVecEnv, 50k steps — no GPU needed).
curriculum-smoke = "python train_curriculum.py --n-envs 2 --no-subproc --device cpu --timesteps 50000 --save-dir ./checkpoints_smoke --run-name smoke-curriculum"

# Resume from last checkpoint (same flags as curriculum, auto-resumes).
curriculum-resume = "python train_curriculum.py --n-envs 64 --device cuda --subproc --timesteps 150_000_000 --save-dir ./checkpoints --upload-model"

# ── Inference / rendering ─────────────────────────────────────────────────────
render = "python render_policy.py"
